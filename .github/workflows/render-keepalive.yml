name: Render Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ping Render backend health endpoint
        env:
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: node scripts/ping-health.mjs
